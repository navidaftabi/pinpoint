# I5_nl5
mode: ae_eval         # (ignored by parser; you pass via CLI)
device: "mps"                # or "cpu"/"cuda"
batch_size_encode: 256

# Naming aid (used for output filenames)
severity: 5                 # extracts "I5" in output name
noise_level: 5              # 0, 5, 10, 20, 50

# Models (pick the VAE/Transformer trained on this noise level)
ckpt_ae: ckpt/ae/ae_5%.pt

# Data sources
normal_data_path: data/matlab/Normal2.mat
attack_dir: data/matlab/I5                # folder containing the 3 attack classes at severity 5
var_x: Z                           # matrix name in .mat files
var_res: Res                       # matrix name in .mat files

# Output
out_dir: data/baseline/ae/eval/I5/n5
