# I7_nl50
mode: pinpoint_eval         # (ignored by parser; you pass via CLI)
device: "cpu"                # or "cpu"/"cuda"
window: 10                  # your rnn/transformer window
num_samples: 30             # MC samples from VAE
batch_size_encode: 256

# Naming aid (used for output filenames)
severity: 7                 # extracts "I7" in output name
noise_level: 50              # 0, 5, 10, 20, 50

# Models (pick the VAE/RNN trained on this noise level)
ckpt_sp: ckpt/vae/vae_50%.pt
ckpt_tp: ckpt/rnn/rnn_50%.pt

# Data sources
normal_data_path: data/matlab/Normal2.mat
attack_dir: data/matlab/I7                # folder containing the 3 attack classes at severity 7
var_x: Z                           # matrix name in .mat files
var_res: Res                       # matrix name in .mat files
include_se: false

# Output
out_dir: data/baseline/vae_rnn/eval/I7/n50
