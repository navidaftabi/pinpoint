# config file for constructing datasets to train PINPOINT
normal_data_path: "data/matlab/Normal2.mat"
var_x: "Z"
var_res: "Res"
attack_dir: "data/matlab/I9"
out_dir: "data/baseline/vae_rnn"
train_percent: 0.85
window: 10                   # sequence length
batch_size_encode: 256
device: "cpu"               # or "cpu" / "mps"
num_samples: 30
include_se: false

# directory containing your saved VAE checkpoints named like: vae_0%.pt, vae_5%.pt, ...
ckpt_sp: "ckpt/vae/vae_0%.pt"
ckpt_tp: "ckpt/rnn/rnn_0%.pt"
