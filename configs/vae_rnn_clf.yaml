task: pinpoint
device: auto
model:
  kwargs:
    channels: 358
    num_residuals: 2
    mc_samples: 30
train:
  epochs: 1000
  lr: 1e-1
  scheduler: true
  weight_decay: 1e-5
  grad_clip: 10.0
  ckpt_path: ckpt/baseline/vae_rnn_clf.pt
  patience: 30  
  plot_dir: img/baseline
  plt_name: vae_rnn_clf
data:
  root: data/baseline/vae_rnn
  type: vector
  train_X: data/baseline/vae_rnn/X_train.pt
  train_Y: data/baseline/vae_rnn/y_train.pt
  test_X: data/baseline/vae_rnn/X_test.pt
  test_Y: data/baseline/vae_rnn/y_test.pt
  batch_size: 64
